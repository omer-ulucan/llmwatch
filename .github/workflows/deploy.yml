name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            echo "=== Ensuring ~/llmwatch is a git repo ==="
            if [ ! -d ~/llmwatch/.git ]; then
              echo "Not a git repo — cloning fresh (preserving .env files)"
              ENV_BACKUP=$(mktemp -d)
              [ -f ~/llmwatch/backend/.env ] && cp ~/llmwatch/backend/.env "$ENV_BACKUP/backend.env" && echo "Backed up backend/.env"
              [ -f ~/llmwatch/frontend/.env ] && cp ~/llmwatch/frontend/.env "$ENV_BACKUP/frontend.env" && echo "Backed up frontend/.env"

              rm -rf ~/llmwatch
              git clone https://github.com/omer-ulucan/llmwatch.git ~/llmwatch

              [ -f "$ENV_BACKUP/backend.env" ] && cp "$ENV_BACKUP/backend.env" ~/llmwatch/backend/.env && echo "Restored backend/.env"
              [ -f "$ENV_BACKUP/frontend.env" ] && cp "$ENV_BACKUP/frontend.env" ~/llmwatch/frontend/.env && echo "Restored frontend/.env"
              rm -rf "$ENV_BACKUP"
            fi

            cd ~/llmwatch

            echo "=== Syncing to origin/main ==="
            git fetch origin main
            git reset --hard origin/main
            git log --oneline -3

            echo "=== Verifying critical files ==="
            grep "proxy_pass" frontend/nginx.conf
            grep "baseURL" frontend/src/api/client.ts

            echo "=== Stopping containers ==="
            docker-compose down || true

            echo "=== Freeing disk space ==="
            docker system prune -af --volumes
            df -h / | tail -1

            echo "=== Building images ==="
            docker-compose build

            echo "=== Starting containers ==="
            docker-compose up -d

            echo "=== Container status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo "=== Waiting for backend to become healthy ==="
            for i in 1 2 3 4 5 6; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health)
              echo "Attempt $i: HTTP $STATUS"
              [ "$STATUS" = "200" ] && break
              sleep 5
            done

            if [ "$STATUS" != "200" ]; then
              echo "FAIL — dumping logs"
              docker-compose logs --tail=40 frontend
              docker-compose logs --tail=40 backend
              exit 1
            fi

            curl -s http://localhost:3000/api/health
            echo ""
            echo "=== Deploy complete ==="
